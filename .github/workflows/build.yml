name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v2

      # 1. Setup Java 17 (Required for Android builds)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. Setup Python 3.10
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install ONLY Essential Build Tools
      # We removed the conflicting gstreamer/media libraries because
      # Buildozer will download the correct Android versions itself.
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git ffmpeg unzip zip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            libltdl-dev

      # 4. Install Buildozer
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      # 5. Build the APK (Debug Mode)
      - name: Build with Buildozer
        run: |
          # The 'yes' command automatically answers 'y' to license agreements
          yes | buildozer android debug

      # 6. Upload the APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-core-apk
          path: bin/*.apk
