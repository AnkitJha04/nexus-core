name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04  # Using an older, stable version of Ubuntu
    
    steps:
      - uses: actions/checkout@v2

      # 1. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      # 2. Install Buildozer and Dependencies
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git ffmpeg libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good libffi-dev \
            libssl-dev autoconf libtool libtool-bin pkg-config cmake gettext \
            autopoint libltdl-dev openjdk-17-jdk unzip
            
          # Install Buildozer and Cython manually
          pip install buildozer cython==0.29.33

      # 3. Build the APK (The Magic Command)
      - name: Build with Buildozer
        run: |
          # Initialize buildozer (just in case)
          yes | buildozer android debug

      # 4. Upload the APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-core-apk
          path: bin/*.apk
