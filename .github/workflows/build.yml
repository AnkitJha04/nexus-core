name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2

      # 1. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. Install Dependencies (OpenCV Needs These)
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip build-essential git python3 python3-dev ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libgstreamer1.0-0 gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good libffi-dev libssl-dev autoconf \
            libtool libtool-bin pkg-config cmake gettext autopoint libltdl-dev

      # 3. Build with Buildozer
      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: master
          workdir: .

      # 4. Upload the APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-core-apk
          path: bin/*.apk
